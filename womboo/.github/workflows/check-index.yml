name: Verificar que index.html existe

on:
  pull_request:
    branches:
      - main

jobs:
  check-index:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Verificar que index.html existe
        run: |
          if [ -f index.html ]; then
            echo "✓ index.html encontrado"
            exit 0
          else
            echo "✗ index.html no found"
            exit 1
          fi
