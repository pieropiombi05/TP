<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Womboo - Streetwear Minimalista">
    <title>Womboo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <div class="header-container">
            <div class="logo womboo-logo">
                <span>WOMB</span>
                <svg class="animated-eyes" viewBox="0 0 60 30" width="60" height="30">
                    <!-- Ojo izquierdo -->
                    <circle class="eye-white" cx="15" cy="15" r="8"/>
                    <circle class="eye-pupil" cx="15" cy="15" r="4" data-eye="left"/>
                    
                    <!-- Ojo derecho -->
                    <circle class="eye-white" cx="45" cy="15" r="8"/>
                    <circle class="eye-pupil" cx="45" cy="15" r="4" data-eye="right"/>
                </svg>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1 class="hero-title womboo-title">
                    <span>WOMB</span>
                    <svg class="animated-eyes" viewBox="0 0 60 30" width="60" height="30">
                        <!-- Ojo izquierdo -->
                        <circle class="eye-white" cx="15" cy="15" r="8"/>
                        <circle class="eye-pupil" cx="15" cy="15" r="4" data-eye="left"/>
                        
                        <!-- Ojo derecho -->
                        <circle class="eye-white" cx="45" cy="15" r="8"/>
                        <circle class="eye-pupil" cx="45" cy="15" r="4" data-eye="right"/>
                    </svg>
                </h1>
                <p class="hero-tagline">STREETWEAR SIN COMPROMISO</p>
                <div class="hero-divider"></div>
                <p class="hero-description">Ropa que desafía lo ordinario. Cada pieza es una declaración.</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p class="footer-text">© 2026 WOMBOO. ALL RIGHTS RESERVED.</p>
            <p class="footer-text footer-divider-text">—</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
